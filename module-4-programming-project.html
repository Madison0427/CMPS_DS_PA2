// 1. Implement the set data structure using the prototype.

function CustomSet() {
    this.elements = {};
}
CustomSet.prototype.add = function(value) {
    this.elements[value] = true;
};

CustomSet.prototype.has = function(value) {
    return this.elements.hasOwnProperty(value);
};

CustomSet.prototype.union = function(otherSet) {
    const result = new CustomSet();
    
    for (const item in this.elements) {
        result.add(item);
    }
    for (const item in otherSet.elements) {
        result.add(item);
    }
    
    return result;
};

CustomSet.prototype.values = function() {
    return Object.keys(this.elements);
};


// A professor keeps attendence of classes with the following results:
// All students: Mary, Joe, Tim, Rosalee, Vincent, Caroline
// Class 1: Rosalee, Joe, Mary, Tim
// Class 2: Mary, Tim, Vincent, Rosalee, Caroline
// Class 3: Caroline, Tim, Vincent, Rosalee, Joe

// 2. Create a set of students for each class.

const class1 = new CustomSet();
["Rosalee", "Joe", "Mary", "Tim"].forEach(s => class1.add(s));

const class2 = new CustomSet();
["Mary", "Tim", "Vincent", "Rosalee", "Caroline"].forEach(s => class2.add(s));

const class3 = new CustomSet();
["Caroline", "Tim", "Vincent", "Rosalee", "Joe"].forEach(s => s);
 
// 3. Use set operations to get a list of students that attended at least
//    one class.

const allStudentsAtLeastOnce = class1.union(class2).union(class3);
console.log("Students who attended at least one class:", allStudentsAtLeastOnce.values());

// 4. Use set operations to get a list of students that attended all classes.

CustomSet.prototype.intersection = function(otherSet) {
    const result = new CustomSet();
    
    for (const item in this.elements) {
        if (otherSet.has(item)) {
            result.add(item);
        }
    }
    
    return result;
};



// 5. Show that the results for (2) and (3) are a subset of all students.

CustomSet.prototype.isSubsetOf = function(targetSet) {
    for (const item in this.elements) {
        if (!targetSet.has(item)) {
            return false;
        }
    }
    return true;
};


// 6. Implement the dictionary data structure using the prototype.

function Dictionary() {
        this.items = Object.create(null);
    this.size = 0;
}

Dictionary.prototype.set = function(key, value) {
    if (!this.has(key)) {
        this.size++;
    }
    this.items[key] = value;
};

Dictionary.prototype.get = function(key) {
    return this.has(key) ? this.items[key] : undefined;
};

Dictionary.prototype.has = function(key) {
    return Object.prototype.hasOwnProperty.call(this.items, key);
};

Dictionary.prototype.remove = function(key) {
    if (this.has(key)) {
        delete this.items[key];
        this.size--;
        return true;
    }
    return false;
};

Dictionary.prototype.keys = function() {
    return Object.keys(this.items);
};

Dictionary.prototype.values = function() {
    return Object.values(this.items);
};

Dictionary.prototype.clear = function() {
    this.items = Object.create(null);
    this.size = 0;
};


// 7. Complete the method below that adds all key-value pairs from one
//    dictionary into another. See also the example below.

Dictionary.prototype.merge = function(dict) {
  // add all key-value pairs in 'dict' to 'this'
  dict.forEach((value, key) => {
    this.set(key, value);
  });
};

// Test your code by uncommenting these lines:

dict1.set("key2", "val2");
dict1.set("key3", "val3");

dict2.set("key3", "val3b");
dict2.set("key4", "val4");
dict1.merge(dict2);
dict1.print(); // should contain key1-val1, key2-val2, key3-val3b, key4-val4

// 8. Implement the hashtable data structure using the prototype.

function HashTable(limit = 127) {
  this.buckets = new Array(limit);
  this.limit = limit;
}

HashTable.prototype._hash = function(key) {
  var hashValue = 0;
  const prime = 31;
  
  for (var i = 0; i < key.length; i++) {
    hashValue = (hashValue * prime + key.charCodeAt(i)) % this.limit;
  }
  
  return hashValue;
};

HashTable.prototype.set = function(key, value) {
  const index = this._hash(key);
  if (!this.buckets[index]) {
    this.buckets[index] = [];
  }
  const bucket = this.buckets[index];
 for (let i = 0; i < bucket.length; i++) {
    if (bucket[i][0] === key) {
      bucket[i][1] = value;
      return;
    }
  } 
   bucket.push([key, value]);
};

HashTable.prototype.get = function(key) {
  const index = this._hash(key);
  const bucket = this.buckets[index];
  
  if (!bucket) return undefined;
for (let i = 0; i < bucket.length; i++) {
    if (bucket[i][0] === key) {
      return bucket[i][1];
    }
  }
  
  return undefined;
};

HashTable.prototype.remove = function(key) {
  const index = this._hash(key);
  const bucket = this.buckets[index];
  
  if (!bucket) return false;
  for (let i = 0; i < bucket.length; i++) {
    if (bucket[i][0] === key) {
      bucket.splice(i, 1);
      return true;
    }
  }
  
  return false;
};
