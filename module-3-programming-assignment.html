// We are going to implement the linked list data structure described in the
// book. Instead of using 'let' we use 'var' everywhere. Note that this

function LinkedList() {

  // helper class
  function Node(element) {
    this.element = element;
    this.next = null;
  }

  // store length and head
  var length = 0;
  var head = null;

  this.append = function(element) {
    var node = new Node(element);
    var current;

    if(head === null) {
      head = node;
    } else {
      current = head;
      while(current.next) {
        current = current.next;
      }
      current.next = node;
    }
    length++;
     // add a new item to the end of the list
    // ...
  };

  this.insert = function(position, element) {
    // insert a new item at a specific location
    // ...
    if(position >= 0 && position <= length) {
      var node = new Node(element);
      var current = head;
      var previous;
      var index = 0;

      if (position === 0) {
        node.next = current;
        head = node;
      } else {
        while (index++ < position) {
          previous = current;
          current = current.next;
        }
        node.next = current;
        previous.next = node;
      }
      length++;
      return true;
    } else {
      return false;
    }
  };

  this.removeAt = function(position) {
    // remove an element from a specific location
    // ...
    if (position > -1 && position < length) {
      var current = head;
      var previous;
      var index = 0;

      if (position === 0) {
        head = current.next;
      } else {
        while (index++ < position) {
          previous = current;
          current = current.next;
        }
        previous.next = current.next;
      }
      length++;
      return current.element;
    } else {
      return null;
    }
  };

  this.remove = function(element) {
    // remove a specific element from the list
    // ...
    var index = this.indexOf(element);
    return this.removeAt(index);
  };

  this.indexOf = function(element) {
    // return the index of an element in the list
    // ...
    var current = head;
    var index = 0;

    while (current) {
      if (element === current.element) {
        return index;
      }
      index++;
      current = current.next;
    }
    return -1;
  };

  this.isEmpty = function() {
    // check whether the list is empty
    // ...
    return length === 0;
  };

  this.size = function() {
    // return the number of elements in the list
    // ...
    return length;
  };

  this.getHead = function() {
    // return head node
    // ...
    return head;
  };

  this.toString = function() {
    // overwrite the default toString method
    var current = head;
    var string = "List: ";
    while (current) {
      string += current.element + (current.next ? " -> " : "");
      current = current.next;
    }
    return string;
  };

  this.print = function() {
    // print to the console
    console.log(this.toString()); 
  };

}

// 1. Write pseudo code (meaning; use comments) to describe how you would

LinkedList.prototype.append = function(element) {
    var node = new Node(element);
    var current;

    if(this.head === null) {
      this.head = node;
    } else {
      current = this.head;
      while(current.next) {
        current = current.next;
      }
      current.next = node;
    }
    this.length++;
  };

// 4. Repeat (1) and (2) for removeAt.

// Validate position (0 to length-1). return null if invalid.
// Scenarioa A: If removing the first node, make the head point to the second node.
// Scenario B: Traverse to the node before the tsarget position and set its next property to skip the target node and point to the node after it.
// Decrement the list size and return the removed element.

LinkedList.prototype.removeAt = function(position) {
    if (position > -1 && position < length) {
      var current = this.head;
      var previous;
      var index = 0;

      if (position === 0) {
        this.head = current.next;
      } else {
        while (index++ < position) {
          previous = current;
          current = current.next;
        }
        previous.next = current.next;
      }
      length--;
      return current.element;
    } else {
      return null;
    }
  };

// 5. Repeat (1) and (2) for remove.

// Get the index of the element to be removed.
// Check if the element exists in the list.
// Remove the element using the removeAt method based on its index.
// Return the removed element or null if not found.

LinkedList.prototype.remove = function(element) {
    var index = this.indexOf(element);
    return this.removeAt(index);
  };

// 6. Repeat (1) and (2) for indexOf.

// Start from the head of the note and initialize index of 0.
// Traverse the list comaring each node's element with the target element.
// if a match is found, return the current index.
// If the end of the list is reached without finding a match, return -1.

LinkedList.prototype.indexOf = function(element) {
    var current = this.head;
    var index = 0;

    while (current) {
      if (element === current.element) {
        return index;
      }
      index++;
      current = current.next;
    }
    return -1;
  };


// 7. Repeat (1) and (2) for isEmpty.

// Check if the head of the list is nuull.

LinkedList.prototype.isEmpty = function() {
    return this.head === null;
  };

// 8. Repeat (1) and (2) for size.

// Return the length property at the end of the list.

LinkedList.prototype.size = function() {
    return this.length;
  };

// 9. Repeat (1) and (2) for getHead.

LinkedList.prototype.getHead = function() {

  };
