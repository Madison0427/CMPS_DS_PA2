// 1. Implement fibonnacci using a recursive function and test your code.

function fibonacci(n) {
  if (n < 1) return 0;
  if (n <=2) return 1;
  return fibonacci(n - 1) + fibonacci(n - 2);
}

// 1. Implement the minimum coin change problem using dynamic programming.
//    Test your code.

function minCoinChangeDP(coins, amount) {
  const dp = Array(amount + 1).fill(Infinity);
  dp[0] = 0;

  for (let i = 1; i <= amount; i++) {
    for (const coin of coins) {
      if (coin <= i) {
        dp[i] = Math.min(dp[i], dp[i - coin] + 1);
      }
    }
  }

  return dp[amount] === Infinity ? -1 : dp[amount];
}

console.log("Test 1 (Expected: 3):", minCoinChangeDP([1, 2, 5], 11)); 
console.log("Test 2 (Expected: -1):", minCoinChangeDP([2], 3));       
console.log("Test 3 (Expected: 0):", minCoinChangeDP([1, 2, 5], 0));

console.log("Greedy algorithms");

// 1. Implement the minimum coin change problem using a greedy algorithm.
//    Test your code.

function minCoinChangeGreedy(coins, amount) {
  const change = [];
  let total = 0;
  for (let i = coins.length; i >= 0; i--) {
    const coin = coins[i];
    while (total + coin <= amount) {
      change.push(coin);
      total += coin;
        }
  }
  return change;
}

console.log(minCoinChangeGreedy([1, 5, 10, 25], 63));
