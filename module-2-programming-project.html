// 1. Implement the stack data structure using the prototype.
function Stack() {
  this.items = [];
}

Stack.prototype.push = function(element) {
  this.items.push(element);
};

Stack.prototype.pop = function() {
  if (this.isEmpty()) {
    return null;
  }
return this.items.pop();
};

Stack.prototype.peek = function() {
  if (this.isEmpty()) {
    return null;
  }
  return this.items[this.items.length - 1];
};

Stack.prototype.isEmpty = function() {
  return this.items.length === 0;
};

Stack.prototype.size = function() {
  return this.items.length;
};
  
// 2. It is possible to use a stack to check if the number of parentheses in a
//    string is balanced, meaning there are as many opening parentheses as
//    closing ones. In addition, we can also make sure that each opening
//    parenthesis precedes a closing parenthesis. Implement this algorithm.
//    HINT: When encountering '(' push to the stack and when encountering ')'
//    pop from the stack.

function isBalanced(str) {
  const stack = [];

  for (const char of str) {
    if (char === '(') {
      stack.push(char);
    } else if (char === ')') {
      if (stack.length === 0) {
        return false;
      }
      stack.pop();
    }
  }
  return stack.length === 0;
}

// 4. Implement the queue data structure using the prototype.
function Queue() {
  this.storage = [];
  this.head = 0;
  this.tail = 0;
}

Queue.prototype.enqueue = function(value) {
  this.storage[this.tail] = value;
  this.tail++;
}; 
Queue.prototype.dequeue = function() {
  if (this.isEmpty()) {
    return null;
  }
  
  const result = this.storage[this.head];
  delete this.storage[this.head];
  this.head++;
  return result;
};

Queue.prototype.peek = function() {
  return this.isEmpty() ? null : this.storage[this.head];
};

Queue.prototype.size = function() {
  return this.tail - this.head;
};

Queue.prototype.isEmpty = function() {
  return this.size() === 0;
};

// 5. Create a queue that stores edibles, that can be either fruits or
//    vegetables. Use the constructor below to create the edible and store a
//    few of each kind in the queue (at least 3 of each).

function Edible(name, isFruit) {
  this.name = name;
  this.isFruit = isFruit; // if not fruit, it must be a vegetable
  this.toString = function() {
    return "Edible: " + this.name + " Fruit: " + this.isFruit;
  };
}

// ... put your code here ...
function EdibleQueue() {
    this.items = [];

   this.enqueue = function(edible) {
        this.items.push(edible);
    }; 
    
    this.dequeue = function() {
        if (this.isEmpty()) {
            return "Queue is empty";
        }
        return this.items.shift();
    }; 

    this.isEmpty = function() {
        return this.items.length === 0;
    };

    this.printQueue = function() {
        console.log(this.items.map(item => item.toString()).join("\n"));
    };
}

const myQueue = new EdibleQueue();

myQueue.enqueue(new Edible("Apple", true));
myQueue.enqueue(new Edible("Banana", true));
myQueue.enqueue(new Edible("Orange", true));

myQueue.enqueue(new Edible("Carrot", false));
myQueue.enqueue(new Edible("Broccoli", false));
myQueue.enqueue(new Edible("Spinach", false)); 

// 6. Create two more queues: one for fruits and one for vegetables. For this
//    question, only create them (and leave them empty).
const fruitQueue = new EdibleQueue();
const vegetableQueue = new EdibleQueue();

// 7. Dequeue all the elements from the edible queue and enqueue them in the
//    appropriate queue, either for fruits or vegetables.
while (!myQueue.isEmpty()) {
  const currentItem = myQueue.dequeue();
if (currentItem.isFruit) {
        fruitQueue.enqueue(currentItem);
    } else {
        vegetableQueue.enqueue(currentItem);
    }
}
